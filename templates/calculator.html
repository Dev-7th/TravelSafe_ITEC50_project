{% extends 'base.html' %} {% block head %}
<link
  rel="stylesheet"
  href="{{ url_for('static', filename='css/calculator.css') }}"
/>
{% endblock %} {% block content %}
<div class="card">
  <h2>Fuel Cost Calculator</h2>
  <form method="POST">
    <input
      type="number"
      name="distance"
      placeholder="Distance (km)"
      required
    /><br /><br />
    <input
      type="number"
      name="efficiency"
      placeholder="Efficiency (km/L)"
      required
    /><br /><br />
    <input
      type="number"
      step="0.01"
      name="price"
      placeholder="Price per Liter"
      required
    /><br /><br />
    <button type="submit">Calculate</button>
  </form>

  {% if result %}
  <h3>Estimate Cost: ${{ result }}</h3>
  {% endif %}
</div>


{% endblock %}
{% block scripts %}{% endblock %}
